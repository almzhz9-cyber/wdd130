<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Colorado River Rafting Co.</title>
    <meta name="description" content="Get in touch with Colorado River Rafting Co. Contact us for reservations, general inquiries, or questions about our rafting trips on the Colorado River.">
    <meta name="author" content="Alejandro Munoz">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>


    <header>
        <img src="images/wwr.png" alt="rafting-logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <section id="contact-info">

            <div class="company-details">
                <h1>Colorado River Rafting Co.</h1>
                <ul class="contact-list">
                    <li>1234 River Run Road<br>Grand Junction, CO 81501</li>
                    <li><a href="tel:+19705550100">(970) 555-0100</a></li>
                    <li><a href="tel:+18005550199">(800) 555-0199</a></li>
                    <li><a href="mailto:info@coloradoriverrafting.com">info@coloradoriverrafting.com</a></li>
                </ul>
            </div>

            <div class="map-and-form">

                <div class="map-container">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.8354345093156!2d-108.55060!3d39.06390!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMznCsDAzJzUwLjAiTiAxMDjCsDMzJzAyLjIiVw!5e0!3m2!1sen!2sus!4v1234567890"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Colorado River Rafting Co. location map">
                    </iframe>
                </div>

                <div class="form-wrapper">

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Full Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <fieldset class="form-group">
                        <legend>Message Purpose</legend>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="general" required>
                            General Inquiry
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="reservation">
                            Reservation Question
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </fieldset>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Type here..." required></textarea>
                    </div>

                    <label class="checkbox-label">
                        <input type="checkbox" name="newsletter" value="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit" class="submit-btn">Get in Touch!</button>

                </div>

            </div>

        </section>

        <section id="team">
            <h2>We Are Here to Serve You</h2>
            <div class="team-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Maria Gonzalez, Head Guide">
                    <figcaption>Maria Gonzalez<br><span>Head Guide</span></figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="James Rivera, Safety Officer">
                    <figcaption>James Rivera<br><span>Safety Officer</span></figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Priya Patel, Reservations Manager">
                    <figcaption>Priya Patel<br><span>Reservations Manager</span></figcaption>
                </figure>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>©️2026 | Colorado River Rafting Co. | Alejandro Munoz</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/"><img src="images/facebook.png" alt="facebook_icon"></a>
            <a href="https://www.instagram.com/"><img src="images/instagram.png" alt="instagram_icon"></a>
            <a href="https://www.youtube.com/"><img src="images/youtube.png" alt="youtube_icon"></a>
        </nav>
    </footer>

</body>
</html>
